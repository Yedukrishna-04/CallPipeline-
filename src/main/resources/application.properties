spring.application.name=CallPipeline
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/callpipeline}
spring.datasource.username=${DATABASE_USERNAME:callpipeline}
spring.datasource.password=${DATABASE_PASSWORD:callpipeline}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

management.endpoints.web.exposure.include=health,info

callpipeline.webhook.secret=${CALLPIPELINE_WEBHOOK_SECRET:}
